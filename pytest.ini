[pytest]
addopts = --browser chromium --html=reports/report.html --self-contained-html --tracing on --video on --capture=no
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: Smoke testing
    sanity: Sanity testing
    regression: Regression testing
    retesting: Retesting
    integration: Integration testing
    system: System testing
    e2e: End-to-End testing
    uat: User Acceptance Testing
    alpha: Alpha testing
    beta: Beta testing
    api: API testing
    ui: UI testing
    black_box: Black Box testing
    white_box: White Box testing
    gray_box: Gray Box testing
    exploratory: Exploratory testing
    adhoc: Ad-hoc testing
    monkey: Monkey testing
    positive: Positive testing
    negative: Negative testing
    boundary: Boundary Value testing
    equivalence: Equivalence Partitioning
    decision_table: Decision Table testing
    state_transition: State Transition testing
    use_case: Use Case testing
    compatibility: Compatibility testing
    cross_browser: Cross-Browser testing
    cross_platform: Cross-Platform testing
    installation: Installation testing
    localization: Localization testing
    i18n: Internationalization testing
    accessibility: Accessibility testing
    responsive: Responsive layout testing
    recovery: Recovery testing
    failover: Failover testing
    performance: Performance testing
    load: Load testing
    stress: Stress testing
    spike: Spike testing
    endurance: Endurance/Soak testing
    volume: Volume testing
    scalability: Scalability testing
    capacity: Capacity testing
    benchmark: Benchmark testing
    security: Security testing
    vulnerability: Vulnerability testing
    penetration: Penetration testing
    usability: Usability and UX testing
    reliability: Reliability testing
    stability: Stability testing
    availability: Availability testing
    resilience: Resilience testing
    chaos: Chaos testing
    mobile: Mobile testing
    automation: Automation testing
    ai_generated: AI-Generated test cases
    functional: Functional testing
    specialized: Specialized testing
