name: Playwright AI Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      email_recipient:
        description: 'Email address to send the report to'
        required: false
        default: 'mejbaurbahar@gmail.com'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install Playwright Browsers
      run: playwright install --with-deps
    - name: Setup Ollama (Local AI)
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 10
        ollama pull tinyllama
    - name: Run tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest --html=reports/report.html --self-contained-html --tracing on --video on || true
    - name: Upload Report Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-execution-report
        path: reports/
    - name: Send Email Notification (Python)
      if: always()
      run: |
        python utils/send_report.py
      env:
        RECEIVER_EMAIL: ${{ github.event.inputs.email_recipient || 'mejbaurbahar@gmail.com' }}
        JOB_STATUS: ${{ job.status }}
